site_name: Wenyao Notes
site_description: 深度学习、AI agent 与更多学习笔记。
site_url: https://imwenyaot.github.io/website/
repo_url: https://github.com/ImWenyaoT/website
repo_name: ImWenyaoT/website
edit_uri: edit/main/docs/

exclude_docs: |
  superpowers/

validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn

theme:
  name: material
  language: zh
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

hooks:
  - hooks/reading_time.py

extra_css:
  - stylesheets/extra.css

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ImWenyaoT

nav:
  - Home: index.md
  - Deep Learning:
      - deep-learning/index.md
      - deep-learning/neural-network-structure.md
      - deep-learning/gradient-descent.md
      - deep-learning/backpropagation.md
      - deep-learning/gpt-transformer.md
      - deep-learning/attention.md
      - deep-learning/attention-paper.md
  - AI Agent:
      - ai-agent/index.md
      - topics/agent-basics.md
      - topics/implementation-boundaries.md
      - topics/long-term-memory.md
      - papers/react.md
      - papers/react-paper.md
      - papers/swe-agent.md
      - papers/swe-agent-paper.md
  - About: about.md
