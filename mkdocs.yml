site_name: Blog
site_author: ImWenyaoT
site_description: >-
  Notes on agents, AI engineering, and software systems.
repo_name: blog
repo_url: https://github.com/ImWenyaoT/blog/
site_url: https://imwenyaot.github.io/blog/
edit_uri: edit/main/docs/
exclude_docs: |
  notes/mkdocs.yml
  blog/tags.md
theme:
  name: material
  language: zh
  custom_dir: overrides
  icon:
    logo: logo-monochrome
  features:
    - navigation.indexes
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 使用浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 使用深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 跟随系统设置
markdown_extensions:
  - attr_list
  - tables
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
nav:
  - Home: index.md
  - Deep Learning:
      - Topic 导读: notes/deep-learning/index.md
      - 神经网络的结构: notes/deep-learning/neural-network-structure.md
      - 梯度下降法: notes/deep-learning/gradient-descent.md
      - 反向传播算法: notes/deep-learning/backpropagation.md
      - GPT 是什么: notes/deep-learning/gpt-transformer.md
      - 注意力机制: notes/deep-learning/attention.md
  - AI Agent:
      - Topic 导读: notes/ai-agent/index.md
      - Agent 基本概念: notes/topics/agent-basics.md
      - 实现与 provider 边界: notes/topics/implementation-boundaries.md
      - 长期记忆: notes/topics/long-term-memory.md
      - Papers:
          - ReAct: notes/papers/react.md
          - SWE-agent: notes/papers/swe-agent.md
  - Tags: tags.md
  - Notes:
      - 介绍: notes/index.md
      - 快速开始: notes/reading-route.md
plugins:
  - search
  - blog:
      blog_toc: true
      archive_date_format: MMMM yyyy
      categories_allowed:
        - Agents
        - AI Engineering
        - Notes
        - Systems
      authors_profiles: true
      pagination_per_page: 5
      archive_pagination_per_page: 10
      categories_pagination_per_page: 10
      post_slugify: !!python/object/apply:ext.slugs.slugify
        kwds:
          short: true
  - meta
  - tags
  - rss:
      match_path: "blog/posts/.*"
      feeds_filenames:
        rss_created: feed_rss_created.xml
        rss_updated: feed_rss_updated.xml
      date_from_meta:
        as_creation: date.created
        as_update: date.updated
      categories:
        - categories
        - tags
  - social:
      cards_layout: default/variant
      cards_layout_options:
        background_image: layouts/background_normal.png
        background_color: transparent
      cards_layout_dir: layouts
extra:
  social:
    - icon: fontawesome/solid/rss
      link: feed_rss_created.xml
    - icon: fontawesome/brands/github
      link: https://github.com/ImWenyaoT
hooks:
  - hooks/socialmedia.py
extra_css:
  - notes/assets/styles.css
extra_javascript:
  - javascripts/mermaid.mjs
  - javascripts/home.js
watch:
  - layouts
copyright: Copyright &copy; 2026 ImWenyaoT
