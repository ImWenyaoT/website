site_name: Agent Notes
site_description: Agent 论文、代码与系统设计读书笔记
site_url: ""
docs_dir: .
site_dir: ../site
exclude_docs: |
  mkdocs.yml
  requirements-mkdocs.txt

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - 首页: index.md
  - 读法: reading-route.md
  - 论文:
      - ReAct: papers/react.md
      - SWE-agent: papers/swe-agent.md
  - 主题:
      - Agent 基本概念: topics/agent-basics.md
      - 实现与 provider 边界: topics/implementation-boundaries.md
      - 长期记忆: topics/long-term-memory.md

markdown_extensions:
  - fenced_code
  - tables
  - toc:
      permalink: true

extra_css:
  - assets/styles.css
